<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Put The Ball In The Net?</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Libre Baskerville', serif;
    background: #0033aa;
    color: #ffffff;
    min-height: 100vh;
  }

  .masthead {
    background: #0033aa;
  }

  .masthead-stripe {
    background: #FFD700;
    padding: 5px 1.5rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #0033aa;
  }

  .masthead-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem 1.5rem;
    border-bottom: 6px solid #FFD700;
  }

  .masthead-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(32px, 7vw, 64px);
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .masthead-title .blank {
    color: #FFD700;
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-thickness: 3px;
  }

  .hud-bar {
    background: #002288;
    border-bottom: 3px solid #FFD700;
    padding: 7px 1.5rem;
    display: none;
  }

  .hud-bar.visible { display: block; }

  .hud-bar-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .hud-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .hud-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aabfff;
  }

  .hud-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #FFD700;
    letter-spacing: 3px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .match-block {
    background: #0033aa;
    padding: 1.5rem 1.5rem 0;
  }

  .competition-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aabfff;
    margin-bottom: 4px;
  }

  .fixture-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aabfff;
    margin-bottom: 10px;
  }

  .fixture-headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    color: #ffffff;
    line-height: 1;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .info-boxes {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .info-box {
    padding: 14px 16px;
  }

  .info-box.yellow { background: #FFD700; }
  .info-box.blue { background: #002288; }

  .info-box-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-box.yellow .info-box-label { color: #002288; }
  .info-box.blue .info-box-label { color: #aabfff; }

  .info-box-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.1;
  }

  .info-box.yellow .info-box-val { color: #0033aa; }
  .info-box.blue .info-box-val { color: #FFD700; }

  .info-box-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .info-box.yellow .info-box-sub { color: #002288; }
  .info-box.blue .info-box-sub { color: #aabfff; }

  .game-area {
    background: #ffffff;
    color: #0033aa;
    padding: 1.5rem;
  }

  .prompt-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px 0;
    font-size: 22px;
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    background: transparent;
    border: none;
    border-bottom: 3px solid #0033aa;
    color: #0033aa;
    outline: none;
    border-radius: 0;
  }

  input[type="text"]:focus {
    border-bottom-color: #FFD700;
    background: #fff8e0;
  }

  input[type="text"]::placeholder {
    color: #ccc;
    font-weight: 400;
    font-style: italic;
  }

  .dd {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #ffffff;
    border: 3px solid #0033aa;
    border-top: none;
    z-index: 10;
    max-height: 200px;
    overflow-y: auto;
  }

  .ddi {
    padding: 10px 12px;
    font-size: 16px;
    font-family: 'Libre Baskerville', serif;
    cursor: pointer;
    color: #0033aa;
    border-bottom: 1px solid #eee;
  }

  .ddi:last-child { border-bottom: none; }
  .ddi:hover, .ddi.active {
    background: #0033aa;
    color: #FFD700;
  }

  .actions {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    margin-top: 1rem;
  }

  .btn-primary {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: #0033aa;
    color: #FFD700;
    border: none;
    padding: 12px 28px;
    cursor: pointer;
  }

  .btn-primary:hover { background: #002288; }

  .btn-hint {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: #6688cc;
    color: #ffffff;
    border: none;
    padding: 12px 28px;
    cursor: pointer;
  }

  .btn-hint:hover { background: #5577bb; }
  .btn-hint:disabled { background: #aabfff; cursor: default; }

  .btn-secondary {
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    font-style: italic;
    background: transparent;
    color: #888;
    border: none;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .btn-secondary:hover { color: #0033aa; }

  .btn-skip {
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    font-style: italic;
    background: transparent;
    color: #888;
    border: none;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .btn-skip:hover { color: #cc0000; }

  .feedback {
    font-size: 14px;
    margin-top: 1rem;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    font-weight: 700;
    text-transform: uppercase;
    min-height: 22px;
  }

  .feedback.correct { color: #005500; }
  .feedback.wrong { color: #cc0000; }

  .reveal-box {
    margin-top: 1rem;
    background: #0033aa;
    color: #ffffff;
    padding: 1rem 1.25rem;
  }

  .reveal-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #aabfff;
    margin-bottom: 6px;
  }

  .reveal-names {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 700;
    text-transform: uppercase;
    color: #FFD700;
    letter-spacing: 1px;
  }

  .start-area {
    background: #ffffff;
    color: #0033aa;
    padding: 2rem 1.5rem;
  }

  .start-intro {
    font-size: 16px;
    line-height: 1.7;
    color: #1a1a1a;
    margin-bottom: 1.5rem;
    max-width: 580px;
  }

  .era-section {
    margin-bottom: 1.5rem;
    border-top: 3px solid #0033aa;
    padding-top: 1.25rem;
  }

  .era-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 10px;
  }

  .era-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }

  select {
    font-size: 14px;
    font-family: 'Libre Baskerville', serif;
    padding: 8px 10px;
    border: 3px solid #0033aa;
    background: #ffffff;
    color: #0033aa;
    outline: none;
    cursor: pointer;
    border-radius: 0;
  }

  select:focus { border-color: #FFD700; background: #fff8e0; }

  .era-to {
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    color: #888;
    font-style: italic;
  }

  .pool-count {
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    color: #888;
    font-style: italic;
  }

  .mode-row {
    display: flex;
    margin-bottom: 1.5rem;
    border: 3px solid #0033aa;
    width: fit-content;
  }

  .mode-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border: none;
    background: #ffffff;
    color: #888;
  }

  .mode-btn.active {
    background: #0033aa;
    color: #FFD700;
  }

  .mode-btn + .mode-btn {
    border-left: 3px solid #0033aa;
  }

  .over-box {
    background: #ffffff;
    color: #0033aa;
    padding: 2rem 1.5rem;
  }

  .over-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: #0033aa;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 1rem;
  }

  .over-rule {
    height: 3px;
    background: #0033aa;
    margin: 1rem 0;
  }

  .over-stats { margin: 1rem 0; }

  .over-stat {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid #ddd;
  }

  .over-stat-label {
    font-family: 'Libre Baskerville', serif;
    font-size: 14px;
    color: #666;
    flex: 1;
    font-style: italic;
  }

  .over-stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #0033aa;
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-stripe">Unofficial BCFC goalscorer quiz</div>
  <div class="masthead-inner">
    <div class="masthead-title" id="masthead-title">
      Who Put The Ball<br>In The <span id="masthead-blank" class="blank">___</span> Net?
    </div>
  </div>
</div>

<div class="hud-bar" id="hud-bar">
  <div class="hud-bar-inner">
    <div class="hud-item">
      <span class="hud-label">Lives</span>
      <span class="hud-val" id="lives-hud"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Streak</span>
      <span class="hud-val" id="streak-hud">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-val" id="best-hud">0</span>
    </div>
  </div>
</div>

<div class="container" id="game"></div>

<script src="data.js"></script>
<script src="game.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
